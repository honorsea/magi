name: Deployment Guard

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  static-bundle-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify static bundle was regenerated from frontend/src
        run: python scripts/check_static_bundle_fresh.py
